# ┌─────────────────────────────────────────────────────────────┐
# │  ForgeOS · hypridle.conf                                     │
# │  Daemon de inactividad — auto-lock + DPMS + suspend         │
# │  Docs: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/      │
# └─────────────────────────────────────────────────────────────┘

general {
    lock_cmd            = pidof hyprlock || hyprlock   # evita hyprlock duplicado
    before_sleep_cmd    = loginctl lock-session        # lock antes de suspender
    after_sleep_cmd     = hyprctl dispatch dpms on     # reencender pantalla al despertar
    ignore_dbus_inhibit = false                        # respeta inhibitors (vídeo, etc.)
}

# ── 5 minutos: bloquear ───────────────────────────────────────
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# ── 10 minutos: apagar pantalla ───────────────────────────────
listener {
    timeout    = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# ── 30 minutos: suspender ─────────────────────────────────────
listener {
    timeout    = 1800
    on-timeout = systemctl suspend
}
