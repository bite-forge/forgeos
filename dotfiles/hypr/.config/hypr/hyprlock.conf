# ┌─────────────────────────────────────────────────────────────┐
# │  ForgeOS · hyprlock.conf                                     │
# │  Pantalla de bloqueo: reloj + fecha + password (monocromo). │
# │  Docs: https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/      │
# └─────────────────────────────────────────────────────────────┘

general {
    disable_loading_bar = true
    grace               = 2       # seg antes de pedir password (mover ratón cancela)
    hide_cursor         = true
    no_fade_in          = false
    ignore_empty_input  = true
}

# ══════════════════════════════════════════════════════════════
#   FONDO — wallpaper con blur, fallback negro
# ══════════════════════════════════════════════════════════════
# Cuando tengas wallpaper, apunta `path` a él. Sin imagen,
# el `color` da fondo negro sólido coherente con ForgeOS.

background {
    monitor =
    # path  = ~/Pictures/Wallpapers/forgeos-01.jpg
    color   = rgba(10, 10, 10, 1.0)

    blur_passes       = 3
    blur_size         = 8
    noise             = 0.0117
    contrast          = 0.89
    brightness        = 0.6
    vibrancy          = 0.17
    vibrancy_darkness = 0.0
}

# ══════════════════════════════════════════════════════════════
#   LOGO ForgeOS — centrado, sobre el reloj
# ══════════════════════════════════════════════════════════════

image {
    monitor     =
    path        = ~/Pictures/Wallpapers/ForgeOS/forgeos-logo-white.png
    size        = 140
    rounding    = 0
    border_size = 0
    position    = 0, 380
    halign      = center
    valign      = center
}

# ══════════════════════════════════════════════════════════════
#   RELOJ — grande, centrado-superior
# ══════════════════════════════════════════════════════════════

label {
    monitor     =
    text        = cmd[update:1000] echo "<b>$(date +'%H:%M')</b>"
    color       = rgba(240, 240, 240, 1.0)
    font_size   = 120
    font_family = JetBrainsMono Nerd Font

    position    = 0, 200
    halign      = center
    valign      = center
}

# ══════════════════════════════════════════════════════════════
#   FECHA — debajo del reloj
# ══════════════════════════════════════════════════════════════

label {
    monitor     =
    text        = cmd[update:43200000] echo "$(date +'%A, %d de %B')"
    color       = rgba(200, 200, 200, 1.0)
    font_size   = 22
    font_family = JetBrainsMono Nerd Font

    position    = 0, 90
    halign      = center
    valign      = center
}

# ══════════════════════════════════════════════════════════════
#   SALUDO — usuario
# ══════════════════════════════════════════════════════════════

label {
    monitor     =
    text        = Hola, $USER
    color       = rgba(170, 170, 170, 1.0)
    font_size   = 16
    font_family = JetBrainsMono Nerd Font

    position    = 0, -80
    halign      = center
    valign      = center
}

# ══════════════════════════════════════════════════════════════
#   CAMPO DE PASSWORD
# ══════════════════════════════════════════════════════════════

input-field {
    monitor       =
    size          = 320, 54
    outline_thickness = 2
    dots_size     = 0.2
    dots_spacing  = 0.35
    dots_center   = true
    dots_rounding = -1

    outer_color   = rgba(240, 240, 240, 1.0)   # borde blanco
    inner_color   = rgba(20, 20, 20, 0.75)     # negro translúcido
    font_color    = rgba(240, 240, 240, 1.0)
    fade_on_empty = false
    fade_timeout  = 1000

    placeholder_text = <i>Password...</i>
    hide_input    = false
    rounding      = 12

    check_color   = rgba(143, 170, 122, 1.0)   # verde apagado — verificando
    fail_color    = rgba(200, 122, 122, 1.0)   # rojo apagado — error
    fail_text     = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300

    capslock_color = rgba(200, 178, 122, 1.0)  # amarillo apagado — caps

    position      = 0, -150
    halign        = center
    valign        = center
}
