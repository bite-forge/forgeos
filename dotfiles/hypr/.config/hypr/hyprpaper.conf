# ┌─────────────────────────────────────────────────────────────┐
# │  ForgeOS · hyprpaper.conf                                    │
# │  Daemon de wallpaper. Docs: wiki.hypr.land/hyprpaper/       │
# └─────────────────────────────────────────────────────────────┘
#
# Cuando tengas los wallpapers ForgeOS, colócalos en
# ~/Pictures/Wallpapers/ y actualiza preload + wallpaper.
# Para rotación, un script externo puede reescribir este archivo
# y llamar a `hyprctl hyprpaper reload` (lo montamos más adelante).

# Precarga (descomenta cuando tengas la imagen)
# preload = ~/Pictures/Wallpapers/forgeos-01.jpg

# Asignación monitor → wallpaper
#   "monitor,ruta"  o  "monitor,color" para color sólido
# Por defecto: negro sólido (estética ForgeOS, sin imagen aún)
wallpaper = ,#0a0a0a

# Rendimiento
ipc = on
splash = false
