# Sin preload/wallpaper fijo aquí: scripts/wallpaper.sh elige uno
# aleatorio al inicio vía IPC (hyprctl hyprpaper). Fallback negro
# por si el script no corre.
wallpaper = ,#0a0a0a

ipc = on
splash = false
