# ┌─────────────────────────────────────────────────────────────┐
# │  ForgeOS · hyprland.conf                                     │
# │  Config principal. Hardware GPU, keybinds y monitores        │
# │  viven en archivos aparte (source más abajo).                │
# └─────────────────────────────────────────────────────────────┘

# ── Fragmento GPU dinámico (generado por el instalador) ──
# Define AQ_DRM_DEVICES y vars del driver según el hardware
# detectado. NO está versionado: lo escribe lib/dotfiles.sh.
# Si no existe (ej. ejecución manual sin instalar), Hyprland
# avisa pero arranca igual con la GPU por defecto.
source = ~/.config/forgeos/hardware-gpu.conf

# ── Módulos propios (mantiene la modularidad de stormdots) ──
# keybinds.conf define $terminal, $menu, etc. ANTES de usarlos:
# por orden de carga, las variables deben existir cuando los
# binds las procesan.
# monitors.conf lo GENERA el instalador (detección de panel/scale)
# y vive en ~/.config/forgeos/ fuera del árbol stow — evita el
# conflicto del conector eDP-1 entre Katana y WS2.
source = ~/.config/forgeos/monitors.conf
source = ~/.config/hypr/keybinds.conf


#################
### AUTOSTART ###
#################

# Barra de estado
exec-once = waybar

# Wallpaper (hyprpaper — daemon + imagen en hyprpaper.conf)
exec-once = hyprpaper

# Agente de autenticación (polkit)
exec-once = systemctl --user start hyprpolkitagent

# Portapapeles persistente (historial vía cliphist)
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Daemon de inactividad (auto-lock con hyprlock)
exec-once = hypridle

# Notificaciones
exec-once = mako


#############################
### VARIABLES DE ENTORNO  ###
#############################
# NOTA: las variables de GPU (LIBVA_DRIVER_NAME, AQ_DRM_DEVICES,
# etc.) NO van aquí — las define hardware-gpu.conf (sourced arriba).

# Cursor
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16

# Tema Qt/GTK en oscuro
env = GTK_THEME,Adwaita:dark
env = QT_QPA_PLATFORMTHEME,qt5ct

# Wayland nativo para toolkits
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland


#####################
### LOOK AND FEEL ###
#####################
# Estética ForgeOS: blanco/negro + transparencias.
# Borde fino, activo se ilumina blanco; inactivo gris oscuro.

general {
    gaps_in  = 3
    gaps_out = 6

    border_size = 1

    # Activo: blanco con leve gradiente; inactivo: gris oscuro translúcido
    col.active_border   = rgba(ffffffee) rgba(aaaaaabb) 45deg
    col.inactive_border = rgba(2a2a2aaa)

    resize_on_border = true
    allow_tearing    = false

    layout = dwindle
}

decoration {
    rounding       = 10
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled      = true
        range        = 10
        render_power = 2
        color        = rgba(00000088)
    }

    blur {
        enabled  = true
        size     = 6
        passes   = 3
        vibrancy = 0.17
        # Transparencias ForgeOS: el blur da el efecto cristal
        new_optimizations = true
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10,   default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor,    1, 7,    quick
}

# dwindle: pseudotile/preserve_split daban config error en la versión
# de Hyprland probada (Katana). dwindle es el layout por defecto igual.
# Reactivar con la sintaxis correcta de tu versión si se necesita.
# dwindle {
#     pseudotile = true
#     preserve_split = true
# }

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}


#############
### INPUT ###
#############

input {
    kb_layout  = es
    kb_variant =

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace


##############################
### REGLAS DE VENTANAS     ###
##############################

windowrule {
    name           = suppress-maximize-events
    match:class    = .*
    suppress_event = maximize
}

windowrule {
    name              = fix-xwayland-drags
    match:class       = ^$
    match:title       = ^$
    match:xwayland    = true
    match:float       = true
    match:fullscreen  = false
    match:pin         = false
    no_focus          = true
}

# Floating para diálogos y apps de sistema
windowrule {
    name        = float-dialogs
    match:class = ^(pavucontrol|nwg-look|blueman-manager|nm-connection-editor|thunar)$
    float       = yes
}

# Opacidad extra para kitty (transparencia ForgeOS)
windowrule {
    name        = kitty-opacity
    match:class = ^(kitty)$
    opacity     = 0.85 0.75
}

# Opacidad para thunar
windowrule {
    name        = thunar-opacity
    match:class = ^(thunar)$
    opacity     = 0.92 0.85
}
