# ┌─────────────────────────────────────────────────────────────┐
# │  ForgeOS · kitty.conf                                        │
# │  Terminal: JetBrainsMono Nerd Font + monocromo + blur       │
# └─────────────────────────────────────────────────────────────┘
#
# Reload en caliente: Ctrl+Shift+F5
# Docs: https://sw.kovidgoyal.net/kitty/conf/


# ══════════════════════════════════════════════════════════════
#   FUENTE
# ══════════════════════════════════════════════════════════════

font_family       JetBrainsMono Nerd Font
bold_font         JetBrainsMono Nerd Font Bold
italic_font       JetBrainsMono Nerd Font Italic
bold_italic_font  JetBrainsMono Nerd Font Bold Italic

font_size         11.0

adjust_line_height    0
adjust_column_width   0

disable_ligatures     never

symbol_map U+E000-U+F8FF,U+F0000-U+FFFFD,U+100000-U+10FFFD JetBrainsMono Nerd Font


# ══════════════════════════════════════════════════════════════
#   CURSOR
# ══════════════════════════════════════════════════════════════

cursor_shape              beam
cursor_beam_thickness     1.8
cursor_blink_interval     0.5
cursor_stop_blinking_after 15.0


# ══════════════════════════════════════════════════════════════
#   SCROLLBACK
# ══════════════════════════════════════════════════════════════

scrollback_lines              10000
scrollback_pager              less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0
wheel_scroll_multiplier       5.0


# ══════════════════════════════════════════════════════════════
#   RATÓN Y SELECCIÓN
# ══════════════════════════════════════════════════════════════

mouse_hide_wait         3.0
url_color               #ffffff
url_style               curly
open_url_with           default
copy_on_select          no
strip_trailing_spaces   smart


# ══════════════════════════════════════════════════════════════
#   VENTANA
# ══════════════════════════════════════════════════════════════

remember_window_size    yes
initial_window_width    120c
initial_window_height   32c

window_padding_width    8
window_margin_width     0
single_window_margin_width -1
window_border_width     0.5pt
draw_minimal_borders    yes

hide_window_decorations yes
confirm_os_window_close 0


# ══════════════════════════════════════════════════════════════
#   TRANSPARENCIA / BLUR
# ══════════════════════════════════════════════════════════════
# El blur real lo hace Hyprland (regla de ventana). Aquí solo
# la transparencia de fondo. Coherente con opacity de la window
# rule de Hyprland (0.85/0.75).

background_opacity             0.80
dynamic_background_opacity     yes
background_blur                1


# ══════════════════════════════════════════════════════════════
#   PESTAÑAS
# ══════════════════════════════════════════════════════════════

tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal


# ══════════════════════════════════════════════════════════════
#   CAMPANA
# ══════════════════════════════════════════════════════════════

enable_audio_bell       no
visual_bell_duration    0.0
window_alert_on_bell    yes
bell_on_tab             yes


# ══════════════════════════════════════════════════════════════
#   SHELL
# ══════════════════════════════════════════════════════════════

shell                   fish
shell_integration       enabled
editor                  nvim


# ══════════════════════════════════════════════════════════════
#   KEYBINDS
# ══════════════════════════════════════════════════════════════

map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

map ctrl+shift+up       scroll_line_up
map ctrl+shift+down     scroll_line_down
map ctrl+shift+page_up  scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home     scroll_home
map ctrl+shift+end      scroll_end

map ctrl+shift+t        new_tab
map ctrl+shift+q        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+l        next_layout

map ctrl+shift+f5       load_config_file


# ══════════════════════════════════════════════════════════════
#   TEMA: FORGEOS MONOCROMO
#   Blanco / negro / grises. Acentos en grises cálidos neutros.
# ══════════════════════════════════════════════════════════════

# Base
background              #0a0a0a
foreground              #e8e8e8
selection_background    #ffffff
selection_foreground    #0a0a0a

# Cursor
cursor                  #ffffff
cursor_text_color       #0a0a0a

# Bordes de ventana
active_border_color     #ffffff
inactive_border_color   #444444
bell_border_color       #888888

# Tabs
active_tab_background   #e8e8e8
active_tab_foreground   #0a0a0a
inactive_tab_background #1c1c1c
inactive_tab_foreground #999999
tab_bar_background      #0a0a0a

# ── Paleta de 16 colores: base monocroma + color funcional mínimo ──
# Grises para la mayoría; rojo/verde/amarillo apagados para que
# git diff, errores y TUIs (btop, nvim) sigan siendo legibles por color.
# normal
color0  #1c1c1c
color1  #c87a7a
color2  #8faa7a
color3  #c8b27a
color4  #a8a8a8
color5  #b89aae
color6  #8faaaa
color7  #e8e8e8
# bright
color8   #555555
color9   #d68f8f
color10  #a4c08f
color11  #d8c48f
color12  #b8b8b8
color13  #c8acbe
color14  #a4c0c0
color15  #ffffff
